<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0e1320" />
    <title>Глубинный профиль</title>
    <!-- Telegram Mini App SDK: даёт initData, expand() и т.п. -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Заходы НЕ из Telegram (нет подписанного initData) — обычные посетители и модерация
         платёжного сервиса: показываем публичный лендинг вместо загрузочного экрана мини-аппа.
         Из Telegram initData присутствует → остаёмся в мини-аппе. -->
    <script>
      (function () {
        try {
          var wa = window.Telegram && window.Telegram.WebApp;
          if (!wa || !wa.initData) window.location.replace("./landing.html");
        } catch (e) {
          window.location.replace("./landing.html");
        }
      })();
    </script>
    <!-- Шрифты: Lora (контемплятивный серив для заголовков) + Inter (тело). Оба с кириллицей. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="aura" aria-hidden="true"></div>
    <main id="app" class="app">
      <section class="state" id="state">
        <div class="orb" aria-hidden="true"></div>
        <p class="state-title">Собираю, что я о тебе понял…</p>
      </section>
    </main>

    <!-- Конфиг бэкенда грузится динамически внутри app.js с cache-buster (?v=timestamp).
         Раньше был статичный <script src="./config.js"> — Telegram-webview кэшировал его
         ~10 мин, и при ротации туннеля телефон держал МЁРТВЫЙ API_BASE → «не дотянулся до
         профиля». Теперь каждое открытие тянет свежий config. -->
    <script src="./app.js?v=20260713-live-today"></script>
  </body>
</html>
