    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MindCoach — проводник самопознания" />
    <meta
      name="twitter:description"
      content="Увидеть повторяющийся сценарий и превратить понимание в выполнимый шаг."
    />
    <meta
      name="twitter:image"
      content="https://mindcoachbot.ru/og-image-v2.png"
    />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="./site.webmanifest" />
    <!-- Telegram Mini App SDK: даёт initData, expand() и т.п. -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Заходы НЕ из Telegram (нет подписанного initData) — обычные посетители и модерация
         платёжного сервиса: показываем публичный лендинг вместо загрузочного экрана мини-аппа.
         Из Telegram initData присутствует → остаёмся в мини-аппе. -->
    <script>
      (function () {
        try {
          var wa = window.Telegram && window.Telegram.WebApp;
          if (!wa || !wa.initData) window.location.replace("./landing.html");
        } catch (e) {
          window.location.replace("./landing.html");
        }
      })();
    </script>
    <!-- Шрифты: Lora (контемплятивный серив для заголовков) + Inter (тело). Оба с кириллицей. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=20260717-star-focus" />
  </head>
  <body>
    <div class="aura" aria-hidden="true"></div>
    <main id="app" class="app">
      <section class="state" id="state">
        <div class="orb" aria-hidden="true"></div>
        <p class="state-title">Собираю, что я о тебе понял…</p>
      </section>
    </main>

    <!-- И bundle, и конфиг грузятся с новым URL. Telegram может держать ресурсы WebView
         дольше HTTP cache-control, поэтому версия по времени надёжнее статичного номера,
         который легко забыть обновить при следующем релизе. -->
    <script>
      (function () {
        var ts = Date.now();
        var config = document.createElement("script");
        config.src = "./config.js?v=" + ts;
        config.onload = function () {
          var app = document.createElement("script");
          app.src = "./app.js?v=" + ts;
          document.body.appendChild(app);
        };
        document.body.appendChild(config);
      })();
    </script>
  </body>
</html>
